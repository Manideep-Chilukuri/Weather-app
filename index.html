<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WEATHERLY</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">WEATHERLY</p>
        <h1>Current weather for any city</h1>
        <p class="lead">Search by city and country code, then view temperature, humidity, wind speed, and a clean condition icon.</p>
      </div>
    </section>

    <section class="weather-card">
      <form id="weather-form" class="weather-form" autocomplete="off">
        <div class="field-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="Sydney" required />
        </div>

        <div class="field-group">
          <label for="country">Country</label>
          <input type="text" id="country" name="country" placeholder="AU" />
        </div>

        <div class="field-group">
          <label for="api-key">OpenWeatherMap API Key</label>
          <input type="password" id="api-key" name="apiKey" placeholder="Enter API key" required />
        </div>

        <button type="submit">Get Weather</button>
        <p id="message" class="message" aria-live="polite"></p>
      </form>

      <div id="weather-output" class="weather-output hidden" aria-live="polite">
        <div class="weather-header">
          <div>
            <p class="location" id="location-name"></p>
            <p class="condition" id="weather-condition"></p>
          </div>
          <img id="weather-icon" class="weather-icon" alt="Weather icon" />
        </div>

        <div class="weather-details">
          <div class="detail-item">
            <span class="detail-label">Temperature</span>
            <strong id="temperature"></strong>
          </div>
          <div class="detail-item">
            <span class="detail-label">Humidity</span>
            <strong id="humidity"></strong>
          </div>
          <div class="detail-item">
            <span class="detail-label">Wind</span>
            <strong id="wind-speed"></strong>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js?v=2"></script>
</body>
</html>
